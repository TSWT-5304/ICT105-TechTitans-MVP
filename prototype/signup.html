<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up – PeerTutor</title>
    <link rel="stylesheet" href="../css/sign-up.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
    <link rel="stylesheet" href="../css/responsive-fixes.css" />
</head>

<body>

    <a class="logo" href="../html/index.html">
        <img src="../img/Logo.png" class="logo-icon">
        <p><b style="color: #03045E; margin-left: -20px; font-size: 20px;">Peer</b><b
                style="color: #0077B6; font-size: 20px;">Tutor</b></p>
    </a>

    <p class="signup-subtitle">Create your free account</p>

    <div class="signup-card">

        <div class="benefits">
            <div class="benefit-item">
                <i class="ti ti-circle-check"></i>
                Find expert peer tutors instantly
            </div>
            <div class="benefit-item">
                <i class="ti ti-circle-check"></i>
                Book sessions in under 60 seconds
            </div>
            <div class="benefit-item">
                <i class="ti ti-circle-check"></i>
                Cancel anytime, no commitment
            </div>
        </div>

        <div class="field">
            <label for="fullname">Full name</label>
            <div class="input-wrap">
                <input type="text" id="fullname" placeholder="Alex Thompson" />
            </div>
        </div>

        <div class="field">
            <label for="email">University email</label>
            <div class="input-wrap">
                <input type="email" id="email" placeholder="you@university.edu" />
            </div>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="Min. 8 characters" />
                <button class="toggle-password" onclick="togglePassword('password', this)" aria-label="Toggle password">
                    <i class="ti ti-eye"></i>
                </button>
            </div>
        </div>

        <div class="field">
            <label for="confirm-password">Confirm password</label>
            <div class="input-wrap">
                <input type="password" id="confirm-password" placeholder="••••••••" />
            </div>
        </div>

        <div class="checkbox-row">
            <input type="checkbox" id="terms" />
            <label for="terms">
                I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </label>
        </div>

        <button class="btn-create" onclick="window.location.href='stu-dashboard.html'">Create Free Acount</button>

        <p class="signup-footer">
            Already have an account? <a href="../html/sign-in.html">Sign in</a>
        </p>

    </div>

    <script>
        function togglePassword(fieldId, btn) {
            const input = document.getElementById(fieldId);
            const icon = btn.querySelector('.ti');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'ti ti-eye-off';
            } else {
                input.type = 'password';
                icon.className = 'ti ti-eye';
            }
        }
    </script>

    <script src="../js/mobile-nav.js"></script>
</body>

</html>
